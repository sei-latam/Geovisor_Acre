<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#e7ebee] h-screen flex flex-col overflow-hidden">

  <header class="h-16 border-b border-slate-800 bg-[#0f172a]/95 flex items-center justify-between px-6 z-50 rounded-xl m-2 shadow-lg shrink-0">
    
    <nav class="flex h-full items-center gap-6 text-xs tracking-tight text-slate-400">
      <a href="index.html" class="h-full flex items-center px-1 border-b-2 border-blue-500 text-blue-400 font-bold transition-all"><i class="fa-solid fa-house mr-1.5"></i> Inicio</a>
      <a href="area_estudio.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-map-location-dot mr-1.5"></i> Área de Estudio</a>
      <a href="eventos_inundacion.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-chart-line mr-1.5"></i> Análisis de Eventos</a>
      <a href="monitoreo_satelital.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-satellite mr-1.5"></i> Monitoreo Satelital</a>
      <a href="areas_inundacion.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-earth-americas mr-1.5"></i> Áreas de Inundación</a>

    <div class="flex items-center gap-3">

      <img src="img/logo_senamhi.png" alt="Logo" class="h-8 w-auto object-contain bg-white/100 p-1 rounded">
      <img src="img/Logo_MDPRyA.png" alt="Logo" class="h-8 w-auto object-contain bg-white/100 p-1 rounded">
      <img src="img/logo_sei.png" alt="Logo" class="h-8 w-auto object-contain bg-white/100 p-1 rounded">
      <img src="img/logo_BID.png" alt="Logo" class="h-8 w-auto object-contain bg-white/100 p-1 rounded">
    </div>

  </header>

  <div class="flex-1 px-4 pb-2 overflow-y-auto animate-fadeIn">
    <div class="max-w-7xl mx-auto my-4 grid grid-cols-12 gap-6 h-[calc(100vh-6rem)]">
      
      <div class="col-span-6 flex flex-col gap-4 h-full">
        <div class="dashboard-panel p-4 bg-white flex-1 flex flex-col rounded-xl shadow-sm border border-slate-200">

          </div>
        </div>
      </div>

          <span class="text-[10px] font-bold text-slate-900 text-center tracking-wider border-b pb-1 mb-4">Instituciones Participantes</span>
          <div class="grid grid-cols-2 gap-6 items-center justify-items-center flex-1 p-4">
            <div class="w-full h-24 flex items-center justify-center p-2 bg-slate-50 rounded-xl border border-slate-100 hover:shadow-sm transition-all">

            </div>
            <div class="w-full h-24 flex items-center justify-center p-4 bg-slate-50 rounded-xl border border-slate-100 hover:shadow-sm transition-all">
              <img src="img/logo_sei.png" alt="SEI" class="max-h-full max-w-full object-contain">
            </div>
            <div class="w-full h-24 flex items-center justify-center p-4 bg-slate-50 rounded-xl border border-slate-100 hover:shadow-sm transition-all">
              <img src="img/logo_BID.png" alt="BID" class="max-h-full max-w-full object-contain">
            </div>
          </div>

        </div>
      </div>

    </div>

  <footer class="h-10 border-t border-slate-800 bg-[#0f172a]/95 flex items-center justify-center z-50 m-2 rounded-xl shrink-0 shadow-lg text-white">
