<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

</head>
<body class="bg-[#e7ebee] h-screen flex flex-col overflow-hidden">

    <div class="w-1/4 invisible lg:block"></div>

    <nav class="flex h-full items-center gap-6 text-xs tracking-tight text-slate-400">
      <a href="index.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-house mr-1.5"></i> Inicio</a>
      <a href="area_estudio.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-map-location-dot mr-1.5"></i> Área de Estudio</a>
      <a href="eventos_inundacion.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-chart-line mr-1.5"></i> Análisis de Eventos</a>
      <a href="monitoreo_satelital.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-satellite mr-1.5"></i> Monitoreo Satelital</a>

      <a id="nav-areas-inundacion" href="areas_inundacion.html" class="hidden h-full flex items-center px-1 border-b-2 border-transparent text-amber-400 hover:text-amber-300 transition-all"><i class="fa-solid fa-earth-americas mr-1.5"></i> Áreas de Inundación</a>

    <div class="w-1/4 flex items-center justify-end gap-3">
        <button id="btn-login" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 rounded-lg text-[11px] font-bold text-white transition-all flex items-center gap-1.5 border-0 cursor-pointer shadow-md">
            <i class="fas fa-sign-in-alt text-[10px]"></i> Ingresar
        </button>

        <div id="user-profile" class="hidden flex items-center gap-3">
            <span id="user-name" class="text-[11px] text-slate-300 font-semibold max-w-[120px] truncate"></span>
            <button id="btn-logout" class="px-2.5 py-1.5 bg-slate-800 hover:bg-red-600 rounded-lg text-[11px] font-bold text-white transition-all flex items-center gap-1.5 border-0 cursor-pointer shadow-md">
                <i class="fas fa-sign-out-alt text-[10px]"></i> Salir
            </button>
        </div>
    </div>
  </header>

  <div class="flex-1 px-4 pb-2 flex gap-4 h-[calc(100vh-8rem)] items-center overflow-hidden">
    
    <div class="w-[50%] h-full flex flex-col justify-center">
      <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 h-full flex flex-col overflow-hidden">
        
        <div class="border-b pb-3 mb-2 shrink-0 space-y-2">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i class="text-blue-500 text-xs"></i>
              <span class="text-[10px] font-bold text-slate-900 tracking-wider">Curvas IDF</span>
            </div>
            <button onclick="exportarCSVFiltrado('idf')" class="text-[10px] px-2.5 py-1 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded font-bold transition-all flex items-center gap-1">
              <i class="fa-solid fa-download"></i> Exportar Selección CSV
            </button>
          </div>
          
          <div class="flex items-center gap-2">
            <label class="text-[10px] font-bold text-slate-900 shrink-0">Adicionar Escenario:</label>
            <select id="selectIDF" onchange="adicionarPeriodo('idf', this.value); this.value='';" class="text-xs bg-slate-50 border border-slate-200 rounded px-2 py-1 text-slate-700 outline-none focus:border-blue-500 cursor-pointer flex-1">
              <option value="" disabled selected>Seleccione un periodo de retorno...</option>
            </select>
            <div class="flex items-center gap-1 text-[10px] shrink-0 ml-1">
              <button onclick="alternarTodos('idf', true)" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-medium transition-all" title="Activar todos los escenarios"><i class="fa-solid fa-eye mr-0.5"></i> Todos</button>
              <button onclick="alternarTodos('idf', false)" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-medium transition-all" title="Desactivar todos los escenarios"><i class="fa-solid fa-eye-slash mr-0.5"></i> Ninguno</button>
            </div>
          </div>
          
          <div id="tagsIDF" class="flex flex-wrap gap-1 min-h-[24px]"></div>
        </div>

        <div class="flex-1 w-full relative bg-slate-50/50 rounded-xl p-2 border border-slate-100 flex items-center justify-center">
          <div id="loadingIDF" class="absolute z-20 text-xs text-slate-500 font-medium flex items-center gap-2">
            <i class="fa-solid fa-circle-notch animate-spin text-blue-600"></i> Cargando datos...
          </div>
          <canvas id="canvasIDF" class="w-full h-full opacity-0 transition-opacity duration-300"></canvas>
        </div>
      </div>
    </div>
    
    <div class="w-[50%] h-full flex flex-col justify-center">
      <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 h-full flex flex-col overflow-hidden">
        
        <div class="border-b pb-3 mb-2 shrink-0 space-y-2">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i class="text-emerald-500 text-xs"></i>
              <span class="text-[10px] font-bold text-slate-900 tracking-wider">Periodos de Retorno Río Acre</span>
            </div>
            <button onclick="exportarCSVFiltrado('hidro')" class="text-[10px] px-2.5 py-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded font-bold transition-all flex items-center gap-1">
              <i class="fa-solid fa-download"></i> Exportar Selección CSV
            </button>
          </div>
          
          <div class="flex items-center gap-2">
            <label class="text-[10px] font-bold text-slate-900 shrink-0">Adicionar Escenario:</label>
            <select id="selectHidro" onchange="adicionarPeriodo('hidro', this.value); this.value='';" class="text-xs bg-slate-50 border border-slate-200 rounded px-2 py-1 text-slate-700 outline-none focus:border-emerald-500 cursor-pointer flex-1">
              <option value="" disabled selected>Seleccione un periodo de retorno...</option>
            </select>
            <div class="flex items-center gap-1 text-[10px] shrink-0 ml-1">
              <button onclick="alternarTodos('hidro', true)" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-medium transition-all" title="Activar todos los escenarios"><i class="fa-solid fa-eye mr-0.5"></i> Todos</button>
              <button onclick="alternarTodos('hidro', false)" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-medium transition-all" title="Desactivar todos los escenarios"><i class="fa-solid fa-eye-slash mr-0.5"></i> Ninguno</button>
            </div>
          </div>
          
          <div id="tagsHidro" class="flex flex-wrap gap-1 min-h-[24px]"></div>
        </div>

        <div class="flex-1 w-full relative bg-slate-50/50 rounded-xl p-2 border border-slate-100 flex items-center justify-center">
          <div id="loadingHidro" class="absolute z-20 text-xs text-slate-500 font-medium flex items-center gap-2">
            <i class="fa-solid fa-circle-notch animate-spin text-emerald-600"></i> Procesando series...
          </div>
          <canvas id="canvasHidrogramas" class="w-full h-full opacity-0 transition-opacity duration-300"></canvas>
        </div>
      </div>
    </div>

  </div>

  <footer class="h-12 border-t border-slate-800 bg-[#0f172a]/95 flex items-center justify-center z-50 m-2 rounded-xl shrink-0 shadow-lg text-white">
    <div class="flex items-center gap-6"><span class="text-[10px] text-slate-400 font-bold tracking-wider">Autores:</span>
      <div class="flex items-center gap-6 h-6">
        <img src="img/logo_senamhi.png" alt="SENAMHI" class="h-full w-auto object-contain brightness-0 invert opacity-75">
        <img src="img/Logo_MDPRyA.png" alt="MDPRyA" class="h-full w-auto object-contain brightness-0 invert opacity-75">
        <img src="img/logo_sei.png" alt="SEI" class="h-6 w-auto object-contain brightness-0 invert opacity-75">
        <img src="img/logo_BID.png" alt="BID" class="h-5 w-auto object-contain brightness-0 invert opacity-75">
      </div>
    </div>
  </footer>

  <script>
    const urlExcel = "https://raw.githubusercontent.com/sei-latam/Geovisor_Acre/ea28397270357fc86daf5f673cb0321f8b3a3942/charts/Datos%20Ventana%20Eventos%20Inundacion.xlsx";
    
    let chartIDF = null, chartHidro = null;
    let datosIDFOriginales = [], datosHidroOriginales = [];
    let labelsIDF = [], labelsHidro = [];

    // Paletas de color unificadas
    const coloresIDF = { "1 año": "#93c5fd", "2 años": "#60a5fa", "5 años": "#3b82f6", "10 años": "#2563eb", "25 años": "#1d4ed8", "50 años": "#1e40af", "100 años": "#1e3a8a", "500 años": "#0f172a" };
    const coloresHidro = { "1 año": "#a7f3d0", "2 años": "#6ee7b7", "5 años": "#34d399", "10 años": "#10b981", "25 años": "#059669", "50 años": "#047857", "100 años": "#065f46", "500 años": "#022c22" };
    
    // Control de selección activa en pantalla
    let seleccionadosIDF = ["1 año"]; 
    let seleccionadosHidro = ["1 año"];

    document.addEventListener("DOMContentLoaded", function() {
      fetch(urlExcel)
        .then(res => res.arrayBuffer())
        .then(buffer => {
          const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
          
          datosIDFOriginales = XLSX.utils.sheet_to_json(workbook.Sheets["Figura 1"]);
          datosHidroOriginales = XLSX.utils.sheet_to_json(workbook.Sheets["Figura 2"]);

          labelsIDF = datosIDFOriginales.map(row => `${row["Minutos"] || row["_1"]} min`);
          labelsHidro = datosHidroOriginales.map(row => row["Tiempo"] || row["_0"]);

          poblarSelectores();
          inicializarGraficos();
        });
    });

    function poblarSelectores() {
      const periodos = Object.keys(coloresIDF);
      ['selectIDF', 'selectHidro'].forEach(id => {
        const select = document.getElementById(id);
        periodos.forEach(p => {
          let opt = document.createElement("option");
          opt.value = p; opt.innerText = p;
          select.appendChild(opt);
        });
      });
    }

    function inicializarGraficos() {
      document.getElementById('loadingIDF').remove();
      document.getElementById('loadingHidro').remove();
      
      chartIDF = crearEstructuraChart(document.getElementById('canvasIDF'), labelsIDF, 'Precipitación (mm/hr)');
      chartHidro = crearEstructuraChart(document.getElementById('canvasHidrogramas'), labelsHidro, 'Caudal (m³/s)');

      actualizarUI('idf');
      actualizarUI('hidro');
    }

    function crearEstructuraChart(canvas, labels, yTitle) {
      canvas.classList.remove('opacity-0');
      return new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: { labels: labels, datasets: [] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
          scales: {
            x: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 } } },
            y: { title: { display: true, text: yTitle, font: { size: 10, weight: 'bold' } }, grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 } } }
          }
        }
      });
    }

    // --- ACCIONES DENTRO DEL UI SELECT (ADICIONAR / ELIMINAR / ACCIONES RÁPIDAS) ---
    function adicionarPeriodo(tipo, periodo) {
      let lista = (tipo === 'idf') ? seleccionadosIDF : seleccionadosHidro;
      if (!lista.includes(periodo)) {
        lista.push(periodo);
        actualizarUI(tipo);
      }
    }

    function removerPeriodo(tipo, periodo) {
      if (tipo === 'idf') {
        seleccionadosIDF = seleccionadosIDF.filter(p => p !== periodo);
      } else {
        seleccionadosHidro = seleccionadosHidro.filter(p => p !== periodo);
      }
      actualizarUI(tipo);
    }

    // Nueva función unificada que recupera la acción masiva "Todos" / "Ninguno"
    function alternarTodos(tipo, agregarTodos) {
      const todosLosPeriodos = Object.keys(coloresIDF);
      if (tipo === 'idf') {
        seleccionadosIDF = agregarTodos ? [...todosLosPeriodos] : [];
      } else {
        seleccionadosHidro = agregarTodos ? [...todosLosPeriodos] : [];
      }
      actualizarUI(tipo);
    }

    // --- SINCRONIZADOR DE GRÁFICOS Y TAGS ---
    function actualizarUI(tipo) {
      const isIdf = (tipo === 'idf');
      const chart = isIdf ? chartIDF : chartHidro;
      const seleccionados = isIdf ? seleccionadosIDF : seleccionadosHidro;
      const datosOriginales = isIdf ? datosIDFOriginales : datosHidroOriginales;
      const paleta = isIdf ? coloresIDF : coloresHidro;
      const tagContainer = document.getElementById(isIdf ? 'tagsIDF' : 'tagsHidro');

      // 1. Reconstruir datasets del Chart.js según selección
      chart.data.datasets = seleccionados.map(periodo => ({
        label: periodo,
        data: datosOriginales.map(row => parseFloat(row[periodo])),
        borderColor: paleta[periodo],
        backgroundColor: paleta[periodo],
        pointRadius: 0, hoverRadius: 5, borderWidth: 2.5, tension: 0.15
      }));
      chart.update();

      // 2. Renderizar Tags interactivos con botón de borrado (X)
      tagContainer.innerHTML = "";
      seleccionados.forEach(periodo => {
        const bgBadge = isIdf ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200';
        tagContainer.innerHTML += `
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium border ${bgBadge}">
            ${periodo}
            <button onclick="removerPeriodo('${tipo}', '${periodo}')" class="hover:text-red-500 font-bold ml-0.5 transition-all">×</button>
          </span>`;
      });
    }

    // --- EXPORTAR EXCLUSIVAMENTE LA SELECCIÓN ACTIVA A CSV ---
    function exportarCSVFiltrado(tipo) {
      const isIdf = (tipo === 'idf');
      const seleccionados = isIdf ? seleccionadosIDF : seleccionadosHidro;
      const datosOriginales = isIdf ? datosIDFOriginales : datosHidroOriginales;
      const xColName = isIdf ? "Minutos" : "Tiempo";

      if (seleccionados.length === 0) {
        alert("Por favor adicione al menos un periodo de retorno para poder exportar.");
        return;
      }

      let filasCSV = [[xColName, ...seleccionados].join(",")];

      datosOriginales.forEach(row => {
        let fila = [row[xColName]];
        seleccionados.forEach(p => fila.push(row[p]));
        filasCSV.push(fila.join(","));
      });

      const blob = new Blob([filasCSV.join("\n")], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", isIdf ? "Seleccion_Curvas_IDF.csv" : "Seleccion_Hidrogramas_Acre.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

<script src="./auth0-spa-js.production.js"></script>
  <script src="./auth-control.js"></script>
  
</body>
