<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>COAST Geovisor - Análisis de Eventos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo-inst3.png">
  <link class="stylesheet" href="index.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#e7ebee] h-screen flex flex-col overflow-hidden">

  <header class="h-16 border-b border-slate-800 bg-[#0f172a]/95 flex items-center justify-between px-6 z-50 rounded-xl m-2 shadow-lg shrink-0">
    <div class="flex items-center gap-3 w-1/4">
      <img src="logo-inst1.png" alt="Logo" class="h-6 w-auto">
      <img src="logo-inst2.png" alt="Logo" class="h-10 w-auto">
    </div>
    
    <nav class="flex h-full items-center gap-6 text-xs tracking-tight text-slate-400">
      <a href="index.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-house mr-1.5"></i> Inicio</a>
      <a href="area_estudio.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-map-location-dot mr-1.5"></i> Área de Estudio</a>
      <a href="eventos_inundacion.html" class="h-full flex items-center px-1 border-b-2 border-blue-500 text-blue-400 font-bold transition-all"><i class="fa-solid fa-chart-line mr-1.5"></i> Análisis de Eventos</a>
      <a href="monitoreo_satelital.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-satellite mr-1.5"></i> Monitoreo Satelital</a>
      <a href="areas_inundacion.html" class="h-full flex items-center px-1 border-b-2 border-transparent hover:text-slate-200 hover:border-slate-50 transition-all"><i class="fa-solid fa-earth-americas mr-1.5"></i> Áreas de Inundación</a>
    </nav>
    <div class="w-1/4 text-right"><span class="text-white font-bold text-xs uppercase tracking-wider">SEI - SENAMHI</span></div>
  </header>

  <div class="flex-1 px-4 pb-2 overflow-y-auto animate-fadeIn">
    <div class="max-w-7xl mx-auto my-4 grid grid-cols-12 gap-6 h-[calc(100vh-6rem)]">
      
      <div class="col-span-6 flex flex-col h-full">
        <div class="dashboard-panel p-4 bg-white flex-1 flex flex-col">
          <div class="flex-1 w-full rounded-lg border bg-slate-50 overflow-hidden relative flex items-center justify-center">
            <canvas id="eventoChart1"></canvas>
          </div>
        </div>
      </div>

      <div class="col-span-6 flex flex-col h-full">
        <div class="dashboard-panel p-4 bg-white flex-1 flex flex-col">
          <div class="flex-1 w-full rounded-lg border bg-slate-50 overflow-hidden relative flex items-center justify-center">
            <canvas id="eventoChart2"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer class="h-10 border-t border-slate-800 bg-[#0f172a]/95 flex items-center justify-center z-50 m-2 rounded-xl shrink-0 shadow-lg text-white">
    <span class="text-[10px] text-slate-400 font-medium">SENAMHI © 2026</span>
  </footer>
</body>
</html>
